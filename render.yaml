services:
  - type: web
    name: adondeamos-api
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__Default
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: GooglePlaces__ApiKey
        sync: false
      - key: Email__Smtp__Host
        sync: false
      - key: Email__Smtp__Port
        value: "587"
      - key: Email__Smtp__Username
        sync: false
      - key: Email__Smtp__Password
        sync: false
      - key: Email__Smtp__FromAddress
        sync: false
      - key: Auth__AutoConfirmEmail
        value: "false"
      - key: Auth__RequireConfirmedEmailToLogin
        value: "false"
      - key: App__ConfirmEmailUrlBase
        value: "https://adondeamos-api.onrender.com"
